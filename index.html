<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Registration</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        padding: 30px;
        border-radius: 20px;
        width: 400px;
        color: white;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .form-group {
        margin-bottom: 15px;
    }

    label {
        display: block;
        margin-bottom: 5px;
        font-size: 14px;
    }

    input, select, textarea {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: none;
        outline: none;
        font-size: 14px;
    }

    input:focus, select:focus, textarea:focus {
        box-shadow: 0 0 5px #fff;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #ff7a18;
        background: linear-gradient(to right, #ff7a18, #ffb347);
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .success {
        display: none;
        text-align: center;
        margin-top: 15px;
        color: lightgreen;
        font-weight: bold;
    }

    @media(max-width: 500px){
        .container {
            width: 90%;
        }
    }
</style>

</head>
<body>

<div class="container">
    <h2>🎉 Event Registration</h2>

    <form onsubmit="showMessage(event)">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" required placeholder="Enter your name">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" required placeholder="Enter your email">
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" required pattern="[0-9]{10}" placeholder="10-digit number">
        </div>

        <div class="form-group">
            <label>Event Type</label>
            <select required>
                <option value="">Select Event</option>
                <option>Workshop</option>
                <option>Seminar</option>
                <option>Hackathon</option>
            </select>
        </div>

        <div class="form-group">
            <label>Number of Participants</label>
            <input type="number" min="1" max="10" required>
        </div>

        <div class="form-group">
            <label>Additional Notes</label>
            <textarea rows="3" placeholder="Optional"></textarea>
        </div>

        <button type="submit">Register Now 🚀</button>

        <div class="success" id="msg">✅ Registration Successful!</div>

    </form>
</div>

<script>
function showMessage(event){
    event.preventDefault();
    document.getElementById("msg").style.display = "block";
}
</script>

</body>
</html>
